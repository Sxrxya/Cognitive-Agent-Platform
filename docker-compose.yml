version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL Database (Tasks, Users, Logs)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cap_postgres
    environment:
      POSTGRES_USER: cap_user
      POSTGRES_PASSWORD: cap_password
      POSTGRES_DB: cap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap_user -d cap_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis Cache (Agent State, Rate Limiting)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # FastAPI Backend Service
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cap_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cap_user:cap_password@postgres:5432/cap_db
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------
  # Next.js Frontend Service
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cap_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
